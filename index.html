<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gam3ry | Pro Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0b0d; color: white; font-family: sans-serif; }
        .quiz-card { background: #16161a; border: 1px solid #333; border-radius: 15px; }
        .timer-box { font-size: 2rem; font-weight: bold; color: #00d4ff; }
        .warning { color: #ff4d4d; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .option-block { cursor: pointer; transition: 0.2s; border: 1px solid #444; margin-bottom: 10px; padding: 10px; border-radius: 8px; }
        .option-block:hover:not(.disabled) { background: #2a2a35; border-color: #00d4ff; }
        input[type="radio"] { margin-right: 10px; }
    </style>
</head>
<body onload="startQuiz()"> <div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="quiz-card p-4 shadow-lg">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="text-info m-0">Elite Trivia</h2>
                    <div id="timerDisplay" class="timer-box">10s</div>
                </div>
                
                <div id="warningMsg" class="mb-3 text-center" style="height: 24px;"></div>

                <form id="quizForm">
                    <div id="questionsContainer">
                        </div>
                    <button type="button" onclick="submitQuiz()" id="submitBtn" class="btn btn-info w-100 mt-4">Submit Quiz</button>
                </form>

                <div id="resultArea" class="mt-4 text-center d-none">
                    <hr class="border-secondary">
                    <h3 id="finalScoreDisplay"></h3>
                    <p class="text-secondary">Registration window locked.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // TC06: Correct answers stored in an object
    const correctAnswers = { q1: "A", q2: "C", q3: "B", q4: "D", q5: "A" };
    let timeLeft = 10;
    let timerInterval;

    const questions = [
        { id: "q1", text: "Which game features 'Summoner's Rift'?", options: ["League of Legends", "Dota 2", "Valorant", "CS2"], keys: ["A", "B", "C", "D"] },
        { id: "q2", text: "What is the maximum player count in a standard Valorant match?", options: ["6", "8", "10", "12"], keys: ["A", "B", "C", "D"] },
        { id: "q3", text: "Which company developed Counter-Strike?", options: ["Riot", "Valve", "Blizzard", "Epic"], keys: ["A", "B", "C", "D"] },
        { id: "q4", text: "What is 'S' in FPS?", options: ["Slayer", "System", "Server", "Shooter"], keys: ["A", "B", "C", "D"] },
        { id: "q5", text: "Which tool is used for professional game chat?", options: ["Discord", "Skype", "Zoom", "Teams"], keys: ["A", "B", "C", "D"] }
    ];

    function startQuiz() {
        renderQuestions();
        // TC02: setInterval for countdown
        timerInterval = setInterval(updateTimer, 1000);
    }

    function renderQuestions() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = questions.map((q, i) => `
            <div class="mb-4">
                <h5>${i+1}. ${q.text}</h5>
                ${q.options.map((opt, idx) => `
                    <div class="option-block">
                        <input type="radio" name="${q.id}" value="${q.keys[idx]}" id="${q.id}${idx}">
                        <label for="${q.id}${idx}">${opt}</label>
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    function updateTimer() {
        timeLeft--;
        document.getElementById('timerDisplay').innerText = timeLeft + "s";

        // TC03: Warning message at 5 seconds
        if (timeLeft === 5) {
            document.getElementById('warningMsg').innerHTML = `<span class="warning">Only 5 seconds remaining!</span>`;
        }

        // TC04: Auto-submit at 0
        if (timeLeft <= 0) {
            submitQuiz();
        }
    }

    function submitQuiz() {
        // TC05: Stop timer
        clearInterval(timerInterval);
        
        // TC07: Score Calculation
        let score = 0;
        const formData = new FormData(document.getElementById('quizForm'));
        
        for (let key in correctAnswers) {
            if (formData.get(key) === correctAnswers[key]) {
                score++;
            }
        }

        // TC08: Disable inputs after submission
        const inputs = document.querySelectorAll('input[type="radio"]');
        inputs.forEach(input => input.disabled = true);
        document.getElementById('submitBtn').disabled = true;

        // TC09: DOM Updates for score
        document.getElementById('timerDisplay').innerText = "0s";
        document.getElementById('warningMsg').innerText = "Time Expired / Submitted";
        document.getElementById('finalScoreDisplay').innerText = `Final Score: ${score} / 5`;
        document.getElementById('resultArea').classList.remove('d-none');
    }
</script>
</body>
</html>
