<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gam3ry | Event Countdown</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b0b0d; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .countdown-container { text-align: center; background: #16161a; padding: 3rem; border-radius: 20px; border: 2px solid #00d4ff; }
        .time-unit { display: inline-block; margin: 0 15px; }
        .number { font-size: 3.5rem; font-weight: 800; color: #00d4ff; display: block; }
        .label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #888; }
        #statusMessage { font-size: 1.5rem; margin-top: 20px; color: #ff4d4d; }
    </style>
</head>
<body>

<div class="countdown-container shadow-lg">
    <h2 class="mb-4 text-uppercase">Grand Finals Registration</h2>
    <div id="timer">
        <div class="time-unit"><span id="days" class="number">00</span><span class="label">Days</span></div>
        <div class="time-unit"><span id="hours" class="number">00</span><span class="label">Hours</span></div>
        <div class="time-unit"><span id="minutes" class="number">00</span><span class="label">Mins</span></div>
        <div class="time-unit"><span id="seconds" class="number">00</span><span class="label">Secs</span></div>
    </div>
    <div id="statusMessage"></div>
</div>

<script>
    // Set target date (e.g., 2 days from now)
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 2); 

    const countdown = setInterval(function() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        // Calculations for days, hours, minutes, and seconds
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Display via DOM manipulation
        document.getElementById("days").innerText = days.toString().padStart(2, '0');
        document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
        document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
        document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

        // Logic for when timer hits zero
        if (distance < 0) {
            clearInterval(countdown);
            document.getElementById("timer").style.display = "none";
            document.getElementById("statusMessage").innerText = "Registration Closed";
        }
    }, 1000);
</script>
</body>
</html>
